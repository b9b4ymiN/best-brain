name: bootstrap-proof-matrix

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/bootstrap-proof-matrix.yml'
      - 'src/config.ts'
      - 'src/smoke/**'
      - 'scripts/capture-bootstrap-proof.ts'
      - 'scripts/check-bootstrap-matrix.ts'
      - 'package.json'
      - 'bun.lock'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/bootstrap-proof-matrix.yml'
      - 'src/config.ts'
      - 'src/smoke/**'
      - 'scripts/capture-bootstrap-proof.ts'
      - 'scripts/check-bootstrap-matrix.ts'
      - 'package.json'
      - 'bun.lock'

jobs:
  bootstrap-proof:
    name: bootstrap-proof-${{ matrix.os_label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os_label: windows
          - os: macos-latest
            os_label: macos
          - os: ubuntu-latest
            os_label: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Capture bootstrap proof
        run: bun run smoke:bootstrap:proof -- --os-label ${{ matrix.os_label }}
        env:
          BEST_BRAIN_BOOTSTRAP_SKIP_INSTALL: '1'

      - name: Upload bootstrap proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-proof-${{ matrix.os_label }}
          path: artifacts/bootstrap-proofs/${{ matrix.os_label }}.json
          if-no-files-found: error

  bootstrap-proof-matrix-check:
    name: bootstrap-proof-matrix-check
    runs-on: ubuntu-latest
    needs:
      - bootstrap-proof

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download bootstrap proof artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bootstrap-proof-*
          path: artifacts/bootstrap-proofs
          merge-multiple: true

      - name: Validate bootstrap matrix coverage
        run: bun run proof:bootstrap:matrix -- --require-all --proof-dir artifacts/bootstrap-proofs
